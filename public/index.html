<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yonkomlek Bot Data</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f4f6;
}

/* HEADER */
.header {
  background: #1e3a5f;
  color: white;
  padding: 15px 20px;
}
.header h2 { margin: 0; }

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin: 10px;
  flex: 1;
  text-align: center;
}

/* FLEX */
.flex {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* FORM */
input, select {
  padding: 8px;
  margin: 5px;
  width: 150px;
}

/* BUTTON */
button {
  padding: 8px 12px;
  background: #1e3a5f;
  color: white;
  border: none;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">
  <h2>📦 Yonkomlek Bot Data</h2>
</div>

<!-- STATS -->
<div class="flex" id="stats"></div>

<!-- FORM -->
<div style="padding:10px;">
  <select id="kompi">
    <option>Kompi Markas</option>
    <option>Kompi Komunikasi</option>
    <option>Kompi Pernika</option>
    <option>Kompi Bantuan</option>
  </select>

  <input id="nama" placeholder="Nama Barang">
  <input id="jumlah" type="number" placeholder="Jumlah">
  <input id="baik" type="number" placeholder="Baik">
  <input id="rusak" type="number" placeholder="Rusak">
  <input id="pinjam" type="number" placeholder="Dipinjam">
  <input id="ket" placeholder="Keterangan">

  <button onclick="tambah()">Simpan</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Nama</th>
  <th>Kompi</th>
  <th>Jumlah</th>
  <th>Rusak</th>
  <th>Dipinjam</th>
  <th>Siap</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<script>
let data = [];

function hitungSiap(x){
  return x.jumlah - x.rusak - x.pinjam;
}

async function load(){
  let res = await fetch('/api/data');
  data = await res.json();
  render();
}

function render(){
  let t = document.getElementById('tabel');
  t.innerHTML = '';

  let total=0, baik=0, rusak=0, pinjam=0, siap=0;

  data.forEach((x,i)=>{
    let s = hitungSiap(x);

    total += x.jumlah;
    baik += x.baik;
    rusak += x.rusak;
    pinjam += x.pinjam;
    siap += s;

    t.innerHTML += `
    <tr>
      <td>${x.nama}</td>
      <td>${x.kompi}</td>
      <td>${x.jumlah}</td>
      <td>${x.rusak}</td>
      <td>${x.pinjam}</td>
      <td>${s}</td>
      <td>
        <button onclick="hapus(${i})">Hapus</button>
      </td>
    </tr>`;
  });

  document.getElementById('stats').innerHTML = `
    <div class="card">Total Unit<br>${total}</div>
    <div class="card">Baik<br>${baik}</div>
    <div class="card">Rusak<br>${rusak}</div>
    <div class="card">Dipinjam<br>${pinjam}</div>
    <div class="card">Siap<br>${siap}</div>
  `;
}

async function tambah(){
  let obj = {
    kompi: document.getElementById('kompi').value,
    nama: document.getElementById('nama').value,
    jumlah: Number(document.getElementById('jumlah').value),
    baik: Number(document.getElementById('baik').value),
    rusak: Number(document.getElementById('rusak').value),
    pinjam: Number(document.getElementById('pinjam').value),
    keterangan: document.getElementById('ket').value
  };

  data.push(obj);
  await simpan();
}

async function hapus(i){
  data.splice(i,1);
  await simpan();
}

async function simpan(){
  await fetch('/api/data',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });

  load();
}

load();
</script>

</body>
</html>
